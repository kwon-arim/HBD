<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>창용 Day 🎂</title>

<style>

/* ===== 인트로 ===== */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.logo {
  font-size: 60px;
  font-weight: bold;
  letter-spacing: 5px;
  background: linear-gradient(90deg, #0b33e9, #4f8cff, #ffffff);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  -webkit-text-fill-color: transparent;
  animation: logoAnim 3s ease forwards;
}

@keyframes logoAnim {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}

/* ===== 기본 ===== */
body {
  margin: 0;
  height: 100vh;
  background: #000;
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* ===== 버튼 ===== */
button {
  padding: 12px 30px;
  font-size: 16px;
  border: 1px solid white;
  background: transparent;
  color: white;
  border-radius: 30px;
  cursor: pointer;
  margin: 10px;
}

button:hover {
  background: white;
  color: black;
}

/* ===== 카드 ===== */
.card {
  background: white;
  color: black;
  padding: 40px;
  border-radius: 20px;
  width: 350px;
  margin: auto;
  text-align: left;
}

/* ===== 편지 ===== */
.letter {
  line-height: 1.8;
  font-size: 16px;
  white-space: normal;
}

/* ===== 커서 ===== */
.cursor {
  display: inline-block;
  animation: blink 0.8s infinite;
}

.cursor::after {
  content: "▍";
}

@keyframes blink {
  50% { opacity: 0; }
}

/* ===== 엔딩 ===== */
.end-screen {
  position: fixed;
  inset: 0;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px;
  opacity: 0;
  animation: endFadeIn 1.5s ease forwards;
}

.end-content {
  width: 100%;
  max-width: 700px;
  padding: 20px;
  box-sizing: border-box;
  transform: scale(0.95);
  animation: endZoom 1.5s ease forwards;
}

.end-content p {
  margin: 10px 0;
  line-height: 1.8;
  word-break: keep-all;
}

@keyframes endFadeIn {
  to { opacity: 1; }
}

@keyframes endZoom {
  to { transform: scale(1); }
}

</style>
</head>

<body>

<div id="intro">
  <div class="logo">Today is 창용 Day</div>
</div>

<audio id="bgm" loop>
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<div class="container" id="screen">
  <h1>지금, 당신을 위한 이야기가 시작됩니다.</h1>
  <button id="startBtn">Start</button>
</div>

<script>

const intro = document.getElementById("intro");
const startBtn = document.getElementById("startBtn");
const bgm = document.getElementById("bgm");
const screen = document.getElementById("screen");

/* ===== 인트로 제거 ===== */
setTimeout(() => {
  intro.style.transition = "opacity 1.5s ease";
  intro.style.opacity = "0";
  setTimeout(() => intro.remove(), 1500);
}, 3000);

/* ===== 음악 페이드 ===== */
function fadeOutAudio(audio) {
  let volume = 1;
  const fade = setInterval(() => {
    if (volume > 0.05) {
      volume -= 0.05;
      audio.volume = volume;
    } else {
      clearInterval(fade);
      audio.pause();
    }
  }, 200);
}

/* ===== 진짜 타자기 타이핑 ===== */
function typeWriter(text, element, speed, callback) {

  element.textContent = "";

  let i = 0;

  const cursor = document.createElement("span");
  cursor.className = "cursor";
  element.appendChild(cursor);

  function typing() {
    if (i < text.length) {

      const char = text[i];

      if (char === "\n") {
        element.insertBefore(document.createElement("br"), cursor);
      } else {
        element.insertBefore(document.createTextNode(char), cursor);
      }

      i++;
      setTimeout(typing, speed + Math.random() * 20);

    } else {
      cursor.remove();
      callback();
    }
  }

  typing();
}

/* ===== Start ===== */
startBtn.addEventListener("click", async () => {

  await bgm.play();

  screen.innerHTML = `
    <h1>
      이창용님을 위한<br>
      하나의 메시지가 준비되어 있습니다.<br>
      지금 열어보시겠습니까?
    </h1>
    <button id="yes">YES</button>
  `;

  document.getElementById("yes").addEventListener("click", () => {

    screen.innerHTML = `<div id="date" style="font-size:60px;">1월 1일</div>`;
    const dateEl = document.getElementById("date");

    const dates = [];
    for (let d=1; d<=31; d++) dates.push(`1월 ${d}일`);
    for (let d=1; d<=28; d++) dates.push(`2월 ${d}일`);
    dates.push("3월 1일");
    dates.push("3월 2일");

    let index = 0;
    let speed = 200;

    function nextDate() {

      if (index >= dates.length) return;

      dateEl.textContent = dates[index];

      if (speed > 60) speed -= 10;

      if (dates[index] === "3월 2일") {

        screen.style.transform = "scale(1.1)";

        setTimeout(() => {

          screen.innerHTML = `
            <div class="card">
              <div id="letter" class="letter"></div>
            </div>
          `;

          const text = `오빠 안녕, 나야.

오늘은 평범한 하루가 아니라,
오빠가 세상에 태어나서 시작된 특별한 날이잖아.

그래서 이 페이지도 오빠를 위해 준비해봤어.

항상 옆에 있어줘서 고맙고,
같이 웃고 떠들며 보낸 시간들이 나한테는 다 소중해.

이 편지가 오늘을 오래 기억하게 해줬으면 좋겠어.

앞으로도 지금처럼 자연스럽게,
좋은 일들만 더 많이 생겼으면 좋겠다 ㅎㅎ

오늘은 온전히 오빠의 날이야.
생일 진심으로 축하해 🎂`;

          typeWriter(text, document.getElementById("letter"), 40, () => {

            setTimeout(() => {

              screen.innerHTML = `
                <div class="end-screen">
                  <div class="end-content">
                    <p>This story was made for you.</p>
                    <p>이 이야기는 당신을 위해 만들어졌습니다.</p>
                    <p>Today is your day.</p>
                    <p>오늘은 당신의 날입니다.</p>
                    <p>창용 Day 🎂</p>
                    <p>With love.</p>
                    <p>생일을 진심으로 축하합니다 🎉</p>
                  </div>
                </div>
              `;

              fadeOutAudio(bgm);

            }, 2000);

          });

        }, 800);

        return;
      }

      index++;
      setTimeout(nextDate, speed);

    }

    nextDate();

  });

});

</script>

</body>
</html>
