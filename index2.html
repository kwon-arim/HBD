<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>창용 Day 🎬</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

#fadeOverlay{
  position:fixed;
  inset:0;
  background:black;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.8s ease-in-out;
  z-index:9998;
}

#fireworks{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9997;
}

.screen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.logo{
  font-size:60px;
  font-weight:800;
  animation:logoAnim 3s ease forwards;
}

@keyframes logoAnim{
  0%{opacity:0; transform:scale(1.05);}
  30%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0; transform:scale(0.97);}
}

.loader-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.loader{
  width:60px;
  height:60px;
  border:5px solid rgba(255,0,0,0.2);
  border-top:5px solid red;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:20px;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.loading-text{
  font-size:14px;
  letter-spacing:2px;
  opacity:0.7;
}

button{
  padding:12px 28px;
  border-radius:30px;
  border:1px solid white;
  background:transparent;
  color:white;
  cursor:pointer;
  margin-top:20px;
  font-size:14px;
}

#date{
  font-size: clamp(40px, 12vw, 80px);
  transition:opacity 0.3s ease;
}

.card{
  background:white;
  color:black;
  padding:40px;
  border-radius:22px;
  width:420px;
  max-width:92%;
  opacity:0;
  transform:translateY(20px);
  transition:opacity 1s ease, transform 1s ease;
}

.letter{
  white-space:pre-line;
  line-height:1.9;
  font-size:16px;
}

.credits-container{
  position:fixed;
  inset:0;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  perspective:500px;
}

.credits{
  text-align:center;
  transform:rotateX(25deg);
  animation:scrollUp 60s linear forwards;
  font-size:14px;
  line-height:2;
}

@keyframes scrollUp{
  0%{ transform:rotateX(25deg) translateY(100%); }
  100%{ transform:rotateX(25deg) translateY(-120%); }
}

@keyframes droneBlink{
  0%,100%{opacity:1;}
  50%{opacity:0.2;}
}

.drone-light{
  position:absolute;
  width:6px;
  height:6px;
  background:red;
  border-radius:50%;
  top:8px;
  left:22px;
  animation:droneBlink 0.6s infinite;
}

@keyframes sparkle{
  0%{opacity:0; transform:translateY(10px);}
  50%{opacity:1; text-shadow:0 0 15px #fff,0 0 25px #ffd700;}
  100%{opacity:1; text-shadow:0 0 5px #fff;}
}

.sky-text span{
  display:inline-block;
  opacity:0;
  animation:sparkle 1.2s forwards;
}

</style>
</head>

<body>

  <audio id="typingSound" src="bgm3.wav" preload="auto"></audio>

<audio id="bgm"
       src="bgm.mp3"
       preload="auto"
       loop></audio>

<div id="fadeOverlay"></div>
<canvas id="fireworks"></canvas>

<div id="intro">
  <div class="logo">NETFLIX</div>
</div>

<div id="app" class="screen"></div>

<script>

const intro=document.getElementById("intro");
const app=document.getElementById("app");
const overlay=document.getElementById("fadeOverlay");

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let particles=[];

function createFirework(x,y){
  for(let i=0;i<80;i++){
    particles.push({
      x:x,
      y:y,
      angle:Math.random()*Math.PI*2,
      speed:Math.random()*6+2,
      alpha:1
    });
  }
}

function animateFireworks(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,index)=>{
    p.x+=Math.cos(p.angle)*p.speed;
    p.y+=Math.sin(p.angle)*p.speed;
    p.alpha-=0.012;

    ctx.beginPath();
    ctx.arc(p.x,p.y,2.5,0,Math.PI*2);
    ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;
    ctx.fill();

    if(p.alpha<=0){
      particles.splice(index,1);
    }
  });

  requestAnimationFrame(animateFireworks);
}
animateFireworks();

function smoothTransition(callback){
  overlay.style.opacity="0.65";
  setTimeout(()=>{
    callback();
    setTimeout(()=>{ overlay.style.opacity="0"; },200);
  },800);
}

setTimeout(()=>{
  intro.style.opacity="0";
  setTimeout(()=>{
    intro.remove();
    showLoading();
  },800);
},2800);

function showLoading(){
  app.innerHTML=`
    <div class="loader-wrap">
      <div class="loader"></div>
      <div class="loading-text">LOADING...</div>
    </div>
  `;
  setTimeout(showPreTitle,2000);
}

function showPreTitle(){

  const text="당신이 있기에, 이 이야기는 비로소 시작됩니다.";
  app.innerHTML=`<div id="pre"></div>`;

  const el=document.getElementById("pre");
  const typingSound=document.getElementById("typingSound");
  const bgm=document.getElementById("bgm");

  let i=0;

  function typing(){

    if(i<text.length){

      el.textContent += text[i];

      // 🔊 타자 소리
      typingSound.currentTime = 0;
      typingSound.volume = 1.0;
      typingSound.play();

      i++;
      setTimeout(typing,80);

    } else {

      // 🔇 타자 소리 종료
      typingSound.pause();
      typingSound.currentTime = 0;

      // 🎵 BGM 자연 시작
      bgm.currentTime = 0;
      bgm.volume = 0;
      bgm.play();

      let vol = 0;
      const fadeIn = setInterval(()=>{
        if(vol < 0.35){
          vol += 0.02;
          bgm.volume = vol;
        } else {
          clearInterval(fadeIn);
        }
      },50);

      setTimeout(()=> {
        smoothTransition(showMainTitle);
      },800);
    }
  }

  typing();
}


function showMainTitle(){
  app.innerHTML=`
    <h2>그리고 지금, 당신을 위한 <br>
      이야기가 시작됩니다.</h2>
    <button onclick="goMessage()">Start</button>
  `;
}

function goMessage(){ smoothTransition(showMessage); }

function showMessage(){
  app.innerHTML=`
    <h2>
      이창용님을 위한<br>
      특별한 메시지가 도착했습니다.<br>
      지금, 열어보시겠습니까?
    </h2>
    <button onclick="startDate()">YES</button>
  `;
}

function startDate(){
  smoothTransition(()=>{
    app.innerHTML=`<div id="date">1월 1일</div>`;
    runDate();
  });
}

function runDate(){
  const dateEl=document.getElementById("date");
  const dates=[];
  for(let d=1; d<=31; d++) dates.push(`1월 ${d}일`);
  for(let d=1; d<=28; d++) dates.push(`2월 ${d}일`);
  dates.push("3월 1일","3월 2일");

  let index=0;

  function next(){
    if(index>=dates.length) return;

    dateEl.style.opacity=0;
    setTimeout(()=>{
      dateEl.textContent=dates[index];
      dateEl.style.opacity=1;
    },150);

    if(dates[index]==="3월 2일"){
      setTimeout(()=>{ smoothTransition(showLetter); },1600);
      return;
    }

    index++;
    setTimeout(next,120);
  }
  next();
}

function showLetter(){
  app.innerHTML=`
    <div class="card" id="card">
      <div class="letter" id="letter"></div>
    </div>
  `;

  const card=document.getElementById("card");
  setTimeout(()=>{
    card.style.opacity="1";
    card.style.transform="translateY(0)";
  },50);

  const text=`오빠 안녕, 나야.

오늘은 평범한 하루가 아니라,
오빠가 세상에 태어나서 시작된 특별한 날이잖아.

그래서 이 페이지도 오빠를 위해 준비해봤어.
이 페이지랑 이 편지가 오늘을 
오래 기억하게 해줬으면 좋겠다 ㅎㅎ

항상 옆에 있어줘서 고맙고,
같이 웃고 떠들며 보낸 시간들은
나한테는 다 소중해.

오늘은 온전히 오빠의 날이니까
그 어느 때보다 많이 웃고, 행복했으면 좋겠어

생일 진심으로 축하해 🎂`;

  typeWriter(text,document.getElementById("letter"),80,()=>{
    setTimeout(showEnd,2500);
  });
}

function typeWriter(text,el,speed,callback){
  el.textContent="";
  let i=0;
  function typing(){
    if(i<text.length){
      el.textContent+=text[i++];
      setTimeout(typing,speed);
    }else{
      callback();
    }
  }
  typing();
}

function showEnd(){
const bgm = document.getElementById("bgm");
  bgm.volume = 0.35;  // 시작 볼륨
  app.innerHTML=`
    <div class="credits-container">
      <div class="credits">

창용 Day 🎬  <br>
This story was made for one person  <br>
이 이야기는 단 한 사람을 위해 만들어졌습니다.<br>  

A Birthday Story Like No Other  <br>
세상에 단 하나뿐인 생일 이야기  <br>

In Celebration Of March 2  <br>
3월 2일을 기념하며  <br>

Written For The One Who Was Born On This Day  <br>
오늘 태어난 한 사람을 위하여  <br>
  
All The Moments We Shared    <br>
함께한 모든 순간들  <br>

Laughter, Conversations, and Memories   <br>
웃음, 대화, 그리고 추억  <br>

Lighting Every Smile You Gave  <br>
조명 : 당신이 지어준 모든 미소  <br>

Special Appearance The Day You Were Born  <br>
특별 출연 : 당신이 태어난 그날  <br>

Dedicated To The Brightest Person Today  <br>
오늘 가장 빛나는 사람에게  <br>

And To The Story  
That Continues From This Moment  <br>
그리고, 지금 이 순간부터 계속될 이야기  <br>

Happy Birthday  <br>
생일을 진심으로 축하합니다 <br> 

The End  
      </div>
    </div>

    <div id="drone" style="
      position:fixed;
      top:12%;
      left:-150px;
      font-size:28px;
      z-index:9999;">
      🚁
      <div class="drone-light"></div>
    </div>

    <div id="skyText" class="sky-text" style="
      position:fixed;
      top:20%;
      width:100%;
      text-align:center;
      font-size:48px;
      letter-spacing:10px;
      font-weight:bold;
      z-index:9998;">
    </div>
  `;
// 🎬 크레딧 시작 후 60초 뒤 자동 종료 처리
setTimeout(() => {

  // 1️⃣ 3초 암전
  overlay.style.transition = "opacity 3s ease";
  overlay.style.opacity = "1";

  // 2️⃣ 암전 완료 후 BGM 페이드아웃
  setTimeout(() => {

    const fade = setInterval(() => {

      if (bgm.volume > 0.01) {
        bgm.volume -= 0.02;
      } else {
        clearInterval(fade);
        bgm.pause();
        bgm.currentTime = 0;
      }

    }, 80);

  }, 3000);

}, 60000);

function fadeOutBGM() {
  let vol = bgm.volume;

  const fade = setInterval(() => {
    if (vol > 0.02) {
      vol -= 0.02;
      bgm.volume = vol;
    } else {
      bgm.pause();
      bgm.currentTime = 0;
      clearInterval(fade);
    }
  }, 80);
}

  const drone=document.getElementById("drone");
  const sky=document.getElementById("skyText");

  setTimeout(()=>{
    drone.style.transition="transform 8s linear";
    drone.style.transform=`translateX(${window.innerWidth+200}px)`;
  },200);

  const text="HAPPY\nBIRTH\nDAY";
  let i=0;

function writeSky(){
  if(i < text.length){

    if(text[i] === "\n"){
      sky.appendChild(document.createElement("br"));
      i++;
      setTimeout(writeSky,120);
      return;
    }

    const span = document.createElement("span");
    span.textContent = text[i];
    span.style.animationDelay = i * 0.15 + "s";
    sky.appendChild(span);

    i++;
    setTimeout(writeSky,120);
  }
}

  setTimeout(writeSky,2000);

  function finaleFireworks(){
    let count = 0;
    const interval = setInterval(()=>{
      const x = Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
      const y = Math.random() * canvas.height * 0.5 + canvas.height * 0.1;
      createFirework(x, y);
      count++;
      if(count > 15){
        clearInterval(interval);
      }
    },500);
  }

  setTimeout(finaleFireworks,4000);
}

</script>
</body>
</html>
